# KyberGuard Public API — Neue Endpoints für Landing Page
# Diese Konfiguration in die bestehende nginx.conf einbinden

# Rate-Limit Zone (in http{} Block der nginx.conf einfügen)
# AKTIVIERT — war vorher auskommentiert (Finding MITTEL)
# limit_req_zone $binary_remote_addr zone=public_api:10m rate=10r/m;

location /api/public/ {
    # Body-Größe begrenzen — verhindert DoS durch gigantische Requests
    client_max_body_size 2k;

    # Rate-Limiting auf nginx-Ebene (zusätzlich zu slowapi — Defense in Depth)
    limit_req zone=public_api burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://kyberguard-api:8000/api/public/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # X-Forwarded-For NUR mit $remote_addr setzen — verhindert Header-Spoofing
    # durch manipulierte XFF-Header vom Client
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;

    # Security Headers (Defense in Depth — auch vom Backend gesetzt)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cache-Control "no-store" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS für Landing Page
    add_header Access-Control-Allow-Origin "https://kyberguard.de" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # OPTIONS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }
}
