# KyberAssist Dashboard-Endpoint — nginx location Block
# Einfuegen in nginx.conf nach den bestehenden /api/public/* Bloecken
# VOR dem schliessenden } des server-Blocks

# VORAUSSETZUNG: kyberguard-api Container laeuft (docker compose up -d kyberguard-api)

location = /api/dashboard/kyberassist {
    # POST only
    limit_except POST OPTIONS {
        deny all;
    }

    # CORS Preflight
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://kyberguard.de" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Cookie, Authorization, st-auth-mode, fdi-version, rid" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400;
        return 204;
    }

    # Rate-Limit: 20 req/min pro IP (passt zu FastAPI-Limiter)
    limit_req zone=api_limit burst=5 nodelay;

    # Auth-Header + Cookies weiterleiten (SuperTokens benoetigt Cookies)
    proxy_pass         http://kyberguard_waf;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Cookie            $http_cookie;
    proxy_set_header   Connection        "";
    proxy_read_timeout 120s;
    proxy_connect_timeout 5s;

    # CORS Response-Header
    add_header Access-Control-Allow-Origin "https://kyberguard.de" always;
    add_header Access-Control-Allow-Credentials "true" always;
}
