version: '3.8'

networks:
  bot-net:
    driver: bridge
    internal: false
  guardian-net:
    driver: bridge
    internal: true

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: kyberguard-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 0
      DELETE: 0
      NETWORKS: 0
      VOLUMES: 0
      IMAGES: 0
      INFO: 0
      EXEC: 0
    networks:
      - guardian-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.05'

  kyberguard:
    build: .
    container_name: kyberguard
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - bot-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=50M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/data/kyberguard.db') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  quantum-nginx:
    image: openquantumsafe/nginx
    container_name: kyberguard-quantum-nginx
    restart: unless-stopped
    user: "101:101"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/opt/nginx/nginx-conf/nginx.conf:ro
      - ./nginx/certs/server.crt:/opt/nginx/pki/server.crt:ro
      - ./nginx/certs/server.key:/opt/nginx/pki/server.key:ro
      - ./nginx/html:/opt/nginx/html:ro
    networks:
      - bot-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  kyberguard-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: kyberguard-api
    restart: unless-stopped
    user: "1001:1001"
    env_file:
      - .env
    environment:
      # ALLOWED_ORIGINS: Landing-Page-Domain(s), kommasepariert
      - ALLOWED_ORIGINS=https://kyberguard.de,https://www.kyberguard.de
    networks:
      - bot-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32M
    # Kein Port-Expose nach aussen — nur nginx spricht mit dem API
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.30'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  guardian:
    build:
      context: .
      dockerfile: Dockerfile.guardian
    container_name: kyberguard-guardian
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /proc:/host/proc:ro
      - /var/log:/host/log:ro
    networks:
      - guardian-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=20M
    depends_on:
      kyberguard:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
